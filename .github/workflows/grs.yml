name: Update README cards

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Use a PAT in README_STATS_TOKEN (repo scope for classic PAT,
    # or read access to private repositories for fine-grained PAT)
    # so Top Languages can include private repos.
    env:
      STATS_TOKEN: ${{ secrets.README_STATS_TOKEN || github.token }}

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=nightowl&count_private=true
          path: profile/stats.svg
          token: ${{ env.STATS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&langs_count=6&theme=nightowl&count_private=true
          path: profile/top-langs.svg
          token: ${{ env.STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
